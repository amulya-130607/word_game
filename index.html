<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>Neon Speedster</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="game-wrapper">
    <div class="header">
      <h1>NEON <span>SPEEDSTER</span></h1>
      <div id="hud">
        <div class="hud-box">
          <span class="hud-label">SCORE</span>
          <span id="score" class="hud-value">0</span>
        </div>
        <div class="hud-box" style="display:none;" id="hi-score-box">
          <span class="hud-label">HI-SCORE</span>
          <span id="high-score" class="hud-value">0</span>
        </div>
        <div class="hud-box">
          <span class="hud-label">COINS</span>
          <span id="coins" class="hud-value">0</span>
        </div>
        <div class="hud-box">
          <span class="hud-label">SPEED</span>
          <span id="speed" class="hud-value">1 x</span>
        </div>
      </div>
    </div>

    <div class="game-container">
      <canvas id="game" width="400" height="600"></canvas>
      <div id="start-screen" class="overlay">
        <h2>READY TO RACE?</h2>
        <p>Dodge the traffic. Survive.</p>
        <div class="difficulty-section">
          <label for="difficulty">DIFFICULTY:</label>
          <select id="difficulty">
            <option value="easy">EASY</option>
            <option value="normal" selected>NORMAL</option>
            <option value="hard">HARD</option>
            <option value="extreme">EXTREME</option>
          </select>
        </div>
        <button id="startBtn">START ENGINE</button>
      </div>
      <div id="game-over-screen" class="overlay hidden">
        <h2>CRASHED!</h2>
        <p>Final Score: <span id="final-score">0</span></p>
        <button id="restartBtn">TRY AGAIN</button>
      </div>
    </div>

    <div id="controls">Use <strong>← →</strong> or <strong>SWIPE/DRAG</strong> to steer.</div>
  </div>
  <script src="js/game.js"></script>
</body>

</html>
